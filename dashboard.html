<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDS Dashboard — Intrusion Detection System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com">
</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4">
</script>
<style>
  * { box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
  .card { @apply bg-gray-800/80 border border-gray-700/60 rounded-xl; }
  .stat-value { @apply font-bold tabular-nums; }
  .btn { @apply inline-flex items-center gap-2 px-4 py-2.5 rounded-lg font-medium text-xs transition-all duration-200 disabled:opacity-40 disabled:cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-950 shadow-lg hover:shadow-xl hover:scale-105 active:scale-95; }
  .btn-primary { @apply bg-gradient-to-b from-emerald-500 to-emerald-600 hover:from-emerald-400 hover:to-emerald-500 text-white focus:ring-emerald-400/50 shadow-emerald-500/20 hover:shadow-emerald-400/30; }
  .btn-danger { @apply bg-gradient-to-b from-red-500 to-red-600 hover:from-red-400 hover:to-red-500 text-white focus:ring-red-400/50 shadow-red-500/20 hover:shadow-red-400/30; }
  .btn-amber { @apply bg-gradient-to-b from-amber-500 to-amber-600 hover:from-amber-400 hover:to-amber-500 text-white focus:ring-amber-400/50 shadow-amber-500/20 hover:shadow-amber-400/30; }
  .btn-gray { @apply bg-gradient-to-b from-gray-600 to-gray-700 hover:from-gray-500 hover:to-gray-600 text-gray-100 focus:ring-gray-400/50 shadow-gray-600/20 hover:shadow-gray-500/30; }
  .alert-row { @apply text-xs; }
  .alert-row:hover { @apply bg-gray-700/40; }
  #alert-scroll::-webkit-scrollbar { width: 5px; }
  #alert-scroll::-webkit-scrollbar-track { background: transparent; }
  #alert-scroll::-webkit-scrollbar-thumb { @apply bg-gray-600 rounded-full; }
  select { @apply bg-gray-700/80 border border-gray-600/60 rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-emerald-500/50; }
  .pulse { animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .badge { @apply px-2 py-0.5 rounded-full text-xs font-medium; }
  .badge-red { @apply bg-red-500/15 text-red-400; }
  .badge-yellow { @apply bg-amber-500/15 text-amber-400; }
  .badge-green { @apply bg-emerald-500/15 text-emerald-400; }
  .badge-blue { @apply bg-blue-500/15 text-blue-400; }
  .stat-accent { @apply absolute inset-x-0 top-0 h-0.5 rounded-t-xl; }
  #progress-track { transition: width 1s linear; }
</style>
</head>
<body class="bg-gray-950 text-gray-100 antialiased">

<div class="h-screen overflow-hidden flex flex-col max-w-7xl mx-auto px-5 py-4">
  <!-- ============ HEADER ============ -->
  <div class="flex items-center justify-between shrink-0 pb-3 border-b border-gray-800/80">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-emerald-500 to-emerald-700 flex items-center justify-center shadow-lg shadow-emerald-500/15">
        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
      </div>
      <div>
        <div class="flex items-center gap-2.5">
          <h1 class="text-base font-bold tracking-tight">Intrusion Detection System</h1>
          <span id="mode-badge" class="badge badge-blue">Demo</span>
        </div>
        <p class="text-[10px] text-gray-500 tracking-widest uppercase mt-0.5">Real-time Traffic Analysis</p>
      </div>
    </div>
    <div class="flex items-center gap-5">
      <div class="flex items-center gap-2.5">
        <div class="flex items-center gap-1.5">
          <span id="status-dot" class="w-2 h-2 rounded-full bg-gray-500 inline-block"></span>
          <span id="status-text" class="text-xs font-medium text-gray-400">System Offline</span>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <svg class="w-3.5 h-3.5 text-gray-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.14 0M1.394 9.393c5.857-5.858 15.355-5.858 21.213 0"/>
        </svg>
        <select id="interface-select">
          <option value="Wi-Fi">Wi-Fi</option>
          <option value="Ethernet">Ethernet</option>
          <option value="eth0">eth0</option>
          <option value="en0">en0</option>
          <option value="Loopback Pseudo-Interface 1">Loopback</option>
        </select>
      </div>
    </div>
  </div>

  <!-- ============ CONTROLS + PROGRESS ============ -->
  <div class="flex items-center justify-between mt-4 shrink-0">
    <div class="flex items-center gap-6">
      <div class="flex items-center gap-3">
        <button id="btn-start" class="btn btn-primary" onclick="startCapture()">
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/></svg>
          Start 15s
        </button>
        <button id="btn-stop" class="btn btn-danger" onclick="stopCapture()" disabled>
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M5.75 3A1.75 1.75 0 004 4.75v10.5c0 .966.784 1.75 1.75 1.75h8.5A1.75 1.75 0 0016 15.25V4.75A1.75 1.75 0 0014.25 3h-8.5z"/></svg>
          Stop
        </button>
      </div>
      <div class="w-px h-6 bg-gradient-to-b from-transparent via-gray-600/60 to-transparent"></div>
      <div class="flex items-center gap-3">
        <button id="btn-test" class="btn btn-amber" onclick="runTest()">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
          Run Test
        </button>
        <button id="btn-clear" class="btn btn-gray" onclick="clearAlerts()">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
          Clear
        </button>
      </div>
    </div>
  </div>

  <!-- Progress bar + demo banner row -->
  <div class="flex items-center gap-3 mt-2 shrink-0 min-h-[28px]">
    <div id="progress-wrap" class="flex-1 hidden">
      <div class="h-1 rounded-full bg-gray-800 overflow-hidden">
        <div id="progress-track" class="h-full rounded-full bg-gradient-to-r from-emerald-500 to-emerald-400" style="width:100%"></div>
      </div>
    </div>
    <div id="demo-banner" class="bg-amber-500/8 border border-amber-500/20 rounded-md px-3 py-1.5 text-amber-400/80 text-[11px] flex items-center gap-1.5 hidden">
      <svg class="w-3 h-3 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/></svg>
      <span><strong class="text-amber-400">Demo Mode</strong> — pre-recorded data shown. Run <code class="bg-gray-800/60 px-1 rounded text-[10px]">python dashboard.py</code> for live capture.</span>
    </div>
  </div>

  <!-- ============ STATS ============ -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-3 shrink-0">
    <!-- Total -->
    <div class="card relative overflow-hidden pt-0">
      <div class="stat-accent bg-gradient-to-r from-blue-500 to-blue-400"></div>
      <div class="pt-4 pb-3 px-4">
        <div class="flex items-center justify-between mb-1">
          <span class="text-[11px] text-gray-500 font-medium tracking-wide uppercase">Total Packets</span>
          <svg class="w-4 h-4 text-blue-400/70" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
        </div>
        <div id="stat-total" class="stat-value text-blue-400 text-2xl">0</div>
      </div>
    </div>
    <!-- Normal -->
    <div class="card relative overflow-hidden pt-0">
      <div class="stat-accent bg-gradient-to-r from-emerald-500 to-emerald-400"></div>
      <div class="pt-4 pb-3 px-4">
        <div class="flex items-center justify-between mb-1">
          <span class="text-[11px] text-gray-500 font-medium tracking-wide uppercase">Normal</span>
          <svg class="w-4 h-4 text-emerald-400/70" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
        <div id="stat-normal" class="stat-value text-emerald-400 text-2xl">0</div>
      </div>
    </div>
    <!-- Attacks -->
    <div class="card relative overflow-hidden pt-0">
      <div class="stat-accent bg-gradient-to-r from-red-500 to-red-400"></div>
      <div class="pt-4 pb-3 px-4">
        <div class="flex items-center justify-between mb-1">
          <span class="text-[11px] text-gray-500 font-medium tracking-wide uppercase">Attacks</span>
          <svg class="w-4 h-4 text-red-400/70" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
        </div>
        <div id="stat-attacks" class="stat-value text-red-400 text-2xl">0</div>
      </div>
    </div>
    <!-- Anomalies -->
    <div class="card relative overflow-hidden pt-0">
      <div class="stat-accent bg-gradient-to-r from-amber-500 to-amber-400"></div>
      <div class="pt-4 pb-3 px-4">
        <div class="flex items-center justify-between mb-1">
          <span class="text-[11px] text-gray-500 font-medium tracking-wide uppercase">Anomalies</span>
          <svg class="w-4 h-4 text-amber-400/70" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        </div>
        <div id="stat-anomalies" class="stat-value text-amber-400 text-2xl">0</div>
      </div>
    </div>
  </div>

  <!-- ============ CHART + ALERTS ============ -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-3 flex-1 min-h-0 mt-3 pb-0.5">
    <!-- Chart -->
    <div class="card flex flex-col min-h-0 py-3 px-4">
      <div class="flex items-center justify-between mb-2 shrink-0">
        <div class="flex items-center gap-2">
          <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span>
          <h2 class="text-xs font-semibold tracking-wide uppercase text-gray-300">Packet Rate</h2>
        </div>
        <span class="text-[10px] text-gray-500 font-medium">packets / sec</span>
      </div>
      <div class="flex-1 min-h-0 relative">
        <canvas id="rate-chart"></canvas>
      </div>
    </div>

    <!-- Alert Feed -->
    <div class="card flex flex-col min-h-0 py-3 px-4">
      <div class="flex items-center justify-between mb-2 shrink-0">
        <div class="flex items-center gap-2">
          <span class="w-1.5 h-1.5 rounded-full bg-amber-400"></span>
          <h2 class="text-xs font-semibold tracking-wide uppercase text-gray-300">Alert Feed</h2>
        </div>
        <span id="alert-count" class="text-[10px] text-gray-500 font-medium">0 alerts</span>
      </div>
      <div class="flex-1 overflow-y-auto min-h-0" id="alert-scroll">
        <table class="w-full text-left border-separate border-spacing-0">
          <thead class="text-[10px] text-gray-500 uppercase tracking-wider sticky top-0 bg-gray-800 z-10">
            <tr>
              <th class="pb-1.5 pr-2 font-semibold w-14">Time</th>
              <th class="pb-1.5 pr-2 font-semibold">Type</th>
              <th class="pb-1.5 pr-2 font-semibold">Source → Dest</th>
              <th class="pb-1.5 text-right font-semibold w-12">Conf</th>
            </tr>
          </thead>
          <tbody id="alert-table-body">
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
// ── Configuration ────────────────────────────────────────
const BACKEND_URL = window.location.port === '5000' || window.location.port === '5001'
  ? '' : 'http://localhost:5000';

// ── Demo Data ───────────────────────────────────────────
const DEMO_DATA = {
  stats: { total: 29, normal: 4, attacks: 25, anomalies: 29 },
  alerts: [
    { timestamp: '2026-07-01T10:00:01', threat_type: 'anomaly', source_ip: '192.168.1.1', destination_ip: '192.168.1.2', confidence: 0.65, details: { type: 'anomaly' } },
    { timestamp: '2026-07-01T10:00:02', threat_type: 'signature', source_ip: '10.0.0.1', destination_ip: '192.168.1.2', confidence: 1.0, details: { type: 'signature', rule: 'syn_flood' } },
    { timestamp: '2026-07-01T10:00:02', threat_type: 'signature', source_ip: '10.0.0.1', destination_ip: '192.168.1.2', confidence: 1.0, details: { type: 'signature', rule: 'port_scan' } },
    { timestamp: '2026-07-01T10:00:02', threat_type: 'anomaly', source_ip: '10.0.0.1', destination_ip: '192.168.1.2', confidence: 0.78, details: { type: 'anomaly' } },
    { timestamp: '2026-07-01T10:00:03', threat_type: 'signature', source_ip: '192.168.1.100', destination_ip: '192.168.1.2', confidence: 1.0, details: { type: 'signature', rule: 'syn_flood' } },
    { timestamp: '2026-07-01T10:00:03', threat_type: 'signature', source_ip: '192.168.1.100', destination_ip: '192.168.1.2', confidence: 1.0, details: { type: 'signature', rule: 'port_scan' } },
    { timestamp: '2026-07-01T10:00:03', threat_type: 'anomaly', source_ip: '192.168.1.100', destination_ip: '192.168.1.2', confidence: 0.71, details: { type: 'anomaly' } },
    { timestamp: '2026-07-01T10:00:04', threat_type: 'anomaly', source_ip: '192.168.1.1', destination_ip: '192.168.1.2', confidence: 0.65, details: { type: 'anomaly' } },
    { timestamp: '2026-07-01T10:00:05', threat_type: 'signature', source_ip: '10.0.0.1', destination_ip: '192.168.1.2', confidence: 1.0, details: { type: 'signature', rule: 'syn_flood' } },
    { timestamp: '2026-07-01T10:00:05', threat_type: 'signature', source_ip: '10.0.0.1', destination_ip: '192.168.1.2', confidence: 1.0, details: { type: 'signature', rule: 'port_scan' } },
    { timestamp: '2026-07-01T10:00:06', threat_type: 'anomaly', source_ip: '192.168.1.100', destination_ip: '192.168.1.2', confidence: 0.65, details: { type: 'anomaly' } },
    { timestamp: '2026-07-01T10:00:07', threat_type: 'signature', source_ip: '10.0.0.1', destination_ip: '192.168.1.2', confidence: 1.0, details: { type: 'signature', rule: 'syn_flood' } },
  ],
  traffic: Array.from({ length: 30 }, (_, i) => ({
    t: new Date(Date.now() - (29 - i) * 1000).toISOString(),
    pps: i < 10 ? Math.random() * 5 : i < 20 ? Math.random() * 20 + 80 : Math.random() * 5 + 2
  }))
};

let isLive = false;
let isCapturing = false;
let isTesting = false;
let pollInterval = null;
let chart = null;

// ── Demo simulation state ───────────────────────────────
let demoTick = 0;
let demoRunning = false;

// ── API helpers ─────────────────────────────────────────
async function api(path, opts = {}) {
  const url = BACKEND_URL ? BACKEND_URL + path : path;
  try {
    const resp = await fetch(url, {
      headers: { 'Content-Type': 'application/json' },
      ...opts
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    return await resp.json();
  } catch {
    return null;
  }
}

async function checkBackend() {
  const result = await api('/api/status');
  if (result && result.mode === 'live') {
    isLive = true;
    document.getElementById('mode-badge').textContent = 'Live';
    document.getElementById('mode-badge').className = 'badge badge-green text-xs';
    document.getElementById('demo-banner').classList.add('hidden');
    return true;
  }
  isLive = false;
  document.getElementById('mode-badge').textContent = 'Demo';
  document.getElementById('mode-badge').className = 'badge badge-blue text-xs';
  document.getElementById('demo-banner').classList.remove('hidden');
  return false;
}

// ── UI Updates ──────────────────────────────────────────
function updateStats(stats) {
  document.getElementById('stat-total').textContent = stats.total ?? 0;
  document.getElementById('stat-normal').textContent = stats.normal ?? 0;
  document.getElementById('stat-attacks').textContent = stats.attacks ?? 0;
  document.getElementById('stat-anomalies').textContent = stats.anomalies ?? 0;
}

function updateStatus(running, testing, remaining) {
  isCapturing = running;
  isTesting = testing;
  const dot = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  const wrap = document.getElementById('progress-wrap');
  const track = document.getElementById('progress-track');
  if (running) {
    dot.className = 'w-2 h-2 rounded-full bg-red-500 inline-block pulse';
    text.textContent = `Capturing  ·  ${remaining}s left`;
    text.className = 'text-xs font-medium text-red-400';
    document.getElementById('btn-start').disabled = true;
    document.getElementById('btn-stop').disabled = false;
    wrap.classList.remove('hidden');
    track.style.width = `${(remaining / 15) * 100}%`;
  } else if (testing) {
    dot.className = 'w-2 h-2 rounded-full bg-amber-500 inline-block pulse';
    text.textContent = 'Testing  ·  processing packets';
    text.className = 'text-xs font-medium text-amber-400';
    document.getElementById('btn-start').disabled = true;
    document.getElementById('btn-stop').disabled = false;
    wrap.classList.remove('hidden');
    track.style.width = '100%';
  } else {
    dot.className = 'w-2 h-2 rounded-full bg-gray-500 inline-block';
    text.textContent = 'System Idle';
    text.className = 'text-xs font-medium text-gray-400';
    document.getElementById('btn-start').disabled = false;
    document.getElementById('btn-stop').disabled = true;
    wrap.classList.add('hidden');
    track.style.width = '100%';
  }
}

function renderAlert(alert) {
  const time = alert.timestamp ? alert.timestamp.slice(11, 19) : '--';
  const type = alert.threat_type || 'unknown';
  const rule = alert.details?.rule || type;
  const src = alert.source_ip || '?';
  const dst = alert.destination_ip || '?';
  const conf = alert.confidence ?? 0;

  const isAttack = type === 'signature';
  const borderColor = isAttack ? 'border-l-red-500/60' : 'border-l-amber-500/60';
  const dotColor = isAttack ? 'bg-red-400' : 'bg-amber-400';
  const label = isAttack ? (alert.details?.rule || 'Signature') : 'Anomaly';
  const badgeClass = isAttack ? 'badge-red' : 'badge-yellow';
  const confClass = conf > 0.8 ? 'text-red-400' : 'text-gray-400';

  return `
    <tr class="alert-row border-l-2 ${borderColor}">
      <td class="py-1.5 pl-2 pr-2 text-gray-400 whitespace-nowrap font-mono text-[11px]">${time}</td>
      <td class="py-1.5 pr-2">
        <span class="flex items-center gap-1.5">
          <span class="w-1.5 h-1.5 rounded-full ${dotColor} shrink-0"></span>
          <span class="badge ${badgeClass}">${label}</span>
        </span>
      </td>
      <td class="py-1.5 pr-2 font-mono text-[11px] text-gray-300">${src} <span class="text-gray-600">→</span> ${dst}</td>
      <td class="py-1.5 text-right font-mono text-[11px] ${confClass}">${conf.toFixed(2)}</td>
    </tr>
  `;
}

function renderAlertTable(alerts) {
  const tbody = document.getElementById('alert-table-body');
  const count = document.getElementById('alert-count');
  if (!alerts || alerts.length === 0) {
    tbody.innerHTML = `
      <tr>
        <td colspan="4">
          <div class="flex flex-col items-center justify-center py-8 text-gray-500">
            <svg class="w-8 h-8 mb-2 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            <span class="text-xs">No alerts yet</span>
          </div>
        </td>
      </tr>
    `;
    count.textContent = '0 alerts';
    return;
  }
  tbody.innerHTML = alerts.slice().reverse().map(renderAlert).join('');
  count.textContent = `${alerts.length} alerts`;
}

// ── Chart ───────────────────────────────────────────────
function initChart() {
  const ctx = document.getElementById('rate-chart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        label: 'Packets/sec',
        data: [],
        borderColor: '#34d399',
        backgroundColor: 'rgba(52, 211, 153, 0.08)',
        fill: true,
        tension: 0.3,
        pointRadius: 0,
        borderWidth: 2,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: {
          ticks: { color: '#6b7280', maxTicksLimit: 8, font: { size: 10 } },
          grid: { color: 'rgba(107,114,128,0.1)' }
        },
        y: {
          beginAtZero: true,
          ticks: { color: '#6b7280', font: { size: 10 } },
          grid: { color: 'rgba(107,114,128,0.1)' }
        }
      },
      animation: { duration: 200 }
    }
  });
}

function updateChart(traffic) {
  if (!chart || !traffic) return;
  const labels = traffic.map(d => {
    const t = new Date(d.t);
    return t.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  });
  const data = traffic.map(d => d.pps);
  chart.data.labels = labels;
  chart.data.datasets[0].data = data;
  chart.update('none');
}

// ── Actions ─────────────────────────────────────────────
async function startCapture() {
  if (!isLive) return;
  const iface = document.getElementById('interface-select').value;
  const result = await api('/api/start', { method: 'POST', body: JSON.stringify({ interface: iface }) });
  if (result?.success) {
    document.getElementById('progress-wrap').classList.remove('hidden');
    document.getElementById('progress-track').style.width = '100%';
    updateStatus(true, false, 15);
  }
}

async function stopCapture() {
  if (isLive) {
    await api('/api/stop', { method: 'POST' });
  }
  demoRunning = false;
  demoTick = 0;
  document.getElementById('btn-test').disabled = false;
  document.getElementById('btn-test').innerHTML = '<svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg> Run Test';
  updateStatus(false, false);
}

async function runTest() {
  await clearAlerts();
  if (isLive) {
    updateStatus(false, true);
    await api('/api/test', { method: 'POST' });
  } else {
    demoRunning = true;
    demoTick = 0;
    document.getElementById('btn-test').disabled = true;
    document.getElementById('btn-test').innerHTML = '<svg class="w-3.5 h-3.5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg> Running...';
    updateStats({ total: 0, normal: 0, attacks: 0, anomalies: 0 });
    renderAlertTable([]);
    updateChart([]);
    updateStatus(false, true);
  }
}

async function clearAlerts() {
  await api('/api/clear', { method: 'POST' });
  demoRunning = false;
  demoTick = 0;
  updateStats({ total: 0, normal: 0, attacks: 0, anomalies: 0 });
  renderAlertTable([]);
  if (chart) {
    chart.data.labels = [];
    chart.data.datasets[0].data = [];
    chart.update('none');
  }
}

// ── Refresh ─────────────────────────────────────────────
async function refreshAll() {
  const [stats, alerts, traffic] = await Promise.all([
    api('/api/stats'),
    api('/api/alerts?limit=100'),
    api('/api/traffic'),
  ]);
  if (stats) updateStats(stats);
  if (alerts) renderAlertTable(alerts);
  if (traffic) updateChart(traffic);
  const status = await api('/api/status');
  if (status) {
    updateStatus(status.running, status.testing, status.time_remaining);
    // Re-enable test button when testing finishes
    if (!status.testing && !status.running) {
      document.getElementById('btn-test').disabled = false;
      document.getElementById('btn-test').innerHTML = '<svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg> Run Test';
    }
  } else {
    // No backend — demo progressive simulation
    tickDemo();
  }
}

// ── Demo progressive simulation ─────────────────────────
function tickDemo() {
  if (!demoRunning) return;
  demoTick++;
  const totalTicks = 14;
  if (demoTick > totalTicks) {
    demoRunning = false;
    updateStatus(false, false);
    document.getElementById('btn-test').disabled = false;
    document.getElementById('btn-test').innerHTML = '<svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg> Run Test';
    demoTick = 0;
    return;
  }

  const pct = demoTick / totalTicks;
  const total = Math.round(29 * pct);
  const attacks = Math.round(25 * pct);
  const anomalies = Math.max(attacks, Math.round(29 * pct));
  updateStats({
    total: total,
    normal: Math.max(0, total - attacks),
    attacks: attacks,
    anomalies: anomalies,
  });

  const alertCount = Math.min(Math.ceil(pct * DEMO_DATA.alerts.length), DEMO_DATA.alerts.length);
  renderAlertTable(DEMO_DATA.alerts.slice(0, alertCount));

  const trafficCount = Math.min(Math.ceil(pct * DEMO_DATA.traffic.length), DEMO_DATA.traffic.length);
  updateChart(DEMO_DATA.traffic.slice(0, trafficCount));

  updateStatus(false, true);
}

// ── Init ────────────────────────────────────────────────
async function init() {
  initChart();

  const online = await checkBackend();
  if (online) {
    clearAlerts();
  }
  // Always poll every 1s — live gets real data, demo polls silently
  pollInterval = setInterval(refreshAll, 1000);
  refreshAll();
}

init();
</script>
